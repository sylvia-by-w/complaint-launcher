<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#3a1e6e" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#120c26" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#05060f" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="nebula" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9b6ff" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#7c5cff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#ff6cf0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="630" fill="#05060f"/>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="230" r="260" fill="url(#nebula)"/>

  <!-- scattered background stars -->
  <g fill="#ffffff">
    <circle cx="80" cy="90" r="1.6" opacity="0.8"/>
    <circle cx="180" cy="200" r="1.2" opacity="0.5"/>
    <circle cx="260" cy="60" r="1.8" opacity="0.9"/>
    <circle cx="1020" cy="120" r="1.5" opacity="0.7"/>
    <circle cx="1100" cy="260" r="1.2" opacity="0.6"/>
    <circle cx="950" cy="70" r="1.8" opacity="0.8"/>
    <circle cx="60" cy="400" r="1.3" opacity="0.6"/>
    <circle cx="1140" cy="420" r="1.4" opacity="0.7"/>
    <circle cx="330" cy="500" r="1.2" opacity="0.5"/>
    <circle cx="900" cy="480" r="1.6" opacity="0.6"/>
    <circle cx="150" cy="330" r="1" opacity="0.5"/>
    <circle cx="1050" cy="360" r="1.1" opacity="0.5"/>
  </g>

  <!-- nebula cluster stars -->
  <g filter="url(#glow)">
    <circle cx="560" cy="180" r="4" fill="#ffffff"/>
    <circle cx="640" cy="150" r="3" fill="#c9b6ff"/>
    <circle cx="500" cy="230" r="3.5" fill="#7dd3fc"/>
    <circle cx="700" cy="210" r="2.5" fill="#f9a8ff"/>
    <circle cx="610" cy="260" r="3" fill="#fef08a"/>
    <circle cx="460" cy="170" r="2" fill="#a78bfa"/>
    <circle cx="730" cy="150" r="2.2" fill="#ffffff"/>
    <circle cx="590" cy="120" r="2.5" fill="#c9b6ff"/>
    <circle cx="670" cy="290" r="2" fill="#7dd3fc"/>
    <circle cx="540" cy="300" r="2.3" fill="#f9a8ff"/>
  </g>

  <!-- a few characters mid-flight -->
  <g fill="#e9e6ff" font-family="sans-serif" font-size="26" opacity="0.85" filter="url(#glow)">
    <text x="330" y="430">烦</text>
    <text x="400" y="380">恼</text>
    <text x="850" y="400">呀</text>
  </g>

  <!-- title -->
  <text x="600" y="560" text-anchor="middle" fill="#e9e6ff" font-family="sans-serif" font-size="42" font-weight="700" filter="url(#glow)">废话转换器</text>
  <text x="600" y="596" text-anchor="middle" fill="#b8b3e6" font-family="sans-serif" font-size="18">把烦恼发射去宇宙 · 让抱怨变成星云</text>
</svg>
